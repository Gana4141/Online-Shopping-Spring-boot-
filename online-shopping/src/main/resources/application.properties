# ===============================
# = DATA SOURCE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/onlineshopping?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=manager@

server.port=9090
spring.datasource.testWhileIdle=true
spring.datasource.validationQuery=SELECT 1

spring.main.banner-mode=off

# ===============================
# = JPA / HIBERNATE
# ===============================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# Spring Security Queries
# ===============================
spring.queries.users-query=select email,password,enabled from user_detail where email=?
spring.queries.roles-query=select email,role from user_detail where email=?